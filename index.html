<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guitar Fretboard Trainer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%234adf8e%22/><text x=%2250%22 y=%2250%22 font-size=%2260%22 font-family=%22sans-serif%22 font-weight=%22bold%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23121212%22>G</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="tab-nav">
            <button class="tab-btn active" data-tab="fretboard-tab-content">Fretboard</button>
            <button class="tab-btn" data-tab="numbers-tab-content">Numbers</button>
        </div>

        <div id="app-body">
            <div id="fretboard-tab-content" class="tab-content active">
                <div id="display-container">
                    <div class="display-wrapper">
                        <h3 class="display-header">String</h3>
                        <div class="display" id="string-display">--</div>
                    </div>
                    <div class="display-wrapper">
                        <h3 class="display-header">Note</h3>
                        <div class="display" id="note-display">--</div>
                    </div>
                </div>
                <div class="control-group">
                    <label>Note Type:</label>
                    <div id="note-type-selector">
                        <button class="note-type-btn active" data-type="naturals">Naturals</button>
                        <button class="note-type-btn" data-type="sharps">Sharps</button>
                        <button class="note-type-btn" data-type="flats">Flats</button>
                        <button class="note-type-btn" data-type="all">All</button>
                    </div>
                </div>
            </div>
            <div id="numbers-tab-content" class="tab-content">
                <div class="control-group">
                    <label for="key-selector">Key:</label>
                    <select id="key-selector">
                        <option value="C">C</option>
                        <option value="Db">Db</option>
                        <option value="D">D</option>
                        <option value="Eb">Eb</option>
                        <option value="E">E</option>
                        <option value="F">F</option>
                        <option value="F#">F#</option>
                        <option value="G">G</option>
                        <option value="Ab">Ab</option>
                        <option value="A">A</option>
                        <option value="Bb">Bb</option>
                        <option value="B">B</option>
                    </select>
                </div>
                <div class="display-wrapper">
                    <h3 class="display-header">Current Number</h3>
                    <div class="display" id="current-number-display">--</div>
                </div>
                <div id="answer-display-container">
                    <div class="display-wrapper">
                        <h3 class="display-header">Number</h3>
                        <div class="display" id="answer-number-display">--</div>
                    </div>
                    <div class="display-wrapper">
                        <h3 class="display-header">Note</h3>
                        <div class="display" id="answer-note-display">--</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="global-controls">
            <div id="metronome">
                <div class="beat-dot" id="beat-1"><span class="accent-caret">^</span></div>
                <div class="beat-dot" id="beat-2"></div>
                <div class="beat-dot" id="beat-3"></div>
                <div class="beat-dot" id="beat-4"></div>
            </div>
            <div class="control-group">
                <label for="tempo-slider">Tempo: <span id="tempo-value">120</span> BPM</label>
                <input type="range" id="tempo-slider" min="40" max="240" value="120">
            </div>
        </div>
        <button id="start-stop-btn">Start</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
